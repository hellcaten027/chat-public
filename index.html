<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>voxchat · streamlined</title>
    <!-- Fonts (system-friendly) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body {
            background: #0a0f0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
        }
        /* Animated background */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 30% 40%, #00ff8020, transparent 40%),
                        radial-gradient(circle at 70% 60%, #00aaff20, transparent 40%);
            animation: moveBG 20s infinite alternate;
            z-index: -1;
        }
        @keyframes moveBG {
            0% { transform: scale(1) translate(0,0); opacity: 0.5; }
            100% { transform: scale(1.1) translate(-2%, -2%); opacity: 1; }
        }

        .glass-card {
            background: rgba(15, 20, 15, 0.8);
            backdrop-filter: blur(10px);
            border: 2px solid #00ff80;
            box-shadow: 0 0 30px #00ff8040, inset 0 0 10px #00ff8020;
            border-radius: 1.5rem;
            color: #00ff80;
        }

        .auth-card {
            max-width: 420px;
            width: 100%;
            padding: 2rem;
            text-align: center;
            animation: flicker 5s infinite;
        }
        @keyframes flicker {
            0% { opacity: 1; }
            2% { opacity: 0.8; }
            4% { opacity: 1; }
            96% { opacity: 1; }
            98% { opacity: 0.9; }
            100% { opacity: 1; }
        }

        .auth-card h1 {
            font-size: 3rem;
            text-shadow: 0 0 10px #00ff80;
            letter-spacing: 2px;
        }
        .auth-card p { color: #a0ffc0; margin-bottom: 1.5rem; }
        .auth-form { display: flex; flex-direction: column; gap: 1rem; }
        .auth-form input {
            background: #1a2a1a;
            border: 1px solid #00ff80;
            border-radius: 2rem;
            padding: 0.9rem 1.2rem;
            color: #00ff80;
            outline: none;
        }
        .auth-form input:focus { border-color: #a0ffc0; }
        .auth-form button, .verification-card button {
            background: #003d1a;
            border: 1px solid #00ff80;
            border-radius: 2rem;
            padding: 0.9rem;
            color: #00ff80;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .auth-form button:hover, .verification-card button:hover {
            background: #006633;
        }
        .auth-toggle span { color: #a0ffc0; cursor: pointer; text-decoration: underline; }
        .error-message { color: #ff8a8a; }
        .hidden { display: none !important; }
        .social-buttons { display: flex; gap: 1rem; margin-top: 1rem; }
        .social-btn { flex:1; background:#1a2a1a; border:1px solid #00ff80; border-radius:2rem; padding:0.8rem; color:#00ff80; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #a0ffc0;
            margin-top: 0.5rem;
        }
        .remember-me input { width: 18px; height: 18px; accent-color: #00ff80; }

        /* Discord button */
        .discord-link {
            margin-top: 1rem;
        }
        .discord-btn {
            background: #5865F2;
            border: none;
            border-radius: 2rem;
            padding: 0.8rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            text-decoration: none;
        }
        .discord-btn:hover { background: #4752c4; }

        .chat-card {
            max-width: 1000px;
            width: 100%;
            height: 90vh;
            border: 2px solid #00ff80;
            background: rgba(10, 15, 10, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 50px #00ff8040;
        }
        @media (max-width: 768px) { .chat-card { height: 95vh; } }

        .chat-header {
            padding: 1rem 2rem;
            border-bottom: 2px solid #00ff80;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #00ff80;
            background: rgba(0,0,0,0.3);
        }
        .chat-header h2 { font-size: 2rem; text-shadow: 0 0 5px #00ff80; }
        .header-actions {
            display: flex;
            gap: 0.5rem;
        }
        .header-actions button {
            background: #1a2a1a;
            border: 1px solid #00ff80;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            color: #00ff80;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .header-actions button:hover { background: #006633; }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            background: rgba(0,0,0,0.2);
            scrollbar-width: thin;
            scrollbar-color: #00ff80 #1a2a1a;
        }
        .messages-area::-webkit-scrollbar { width: 8px; }
        .messages-area::-webkit-scrollbar-track { background: #1a2a1a; }
        .messages-area::-webkit-scrollbar-thumb { background: #00ff80; border-radius: 4px; }

        .date-divider {
            text-align: center;
            color: #a0ffc0;
            font-size: 0.9rem;
            margin: 0.5rem 0;
            position: relative;
        }
        .date-divider::before, .date-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: #00ff80;
        }
        .date-divider::before { left: 0; }
        .date-divider::after { right: 0; }

        .message-bubble {
            max-width: 70%;
            padding: 0.9rem 1.4rem;
            align-self: flex-start;
            background: #1a2a1a;
            border: 1px solid #00ff80;
            border-radius: 1.8rem 1.8rem 1.8rem 0.3rem;
            color: #e0f0e0;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,255,128,0.2);
            transition: 0.2s;
        }
        .message-bubble.own {
            align-self: flex-end;
            background: #003d1a;
            border-radius: 1.8rem 1.8rem 0.3rem 1.8rem;
            color: white;
        }
        /* Role/VIP animations */
        .message-bubble.role-owner { border-color: #ff4500; box-shadow: 0 0 15px #ff4500; animation: pulseOwner 2s infinite; }
        .message-bubble.role-admin { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; animation: pulseAdmin 2s infinite; }
        .message-bubble.role-mod { border-color: #00ff00; box-shadow: 0 0 15px #00ff00; animation: pulseMod 2s infinite; }
        .message-bubble.role-vip { border-color: #ffaa00; box-shadow: 0 0 20px #ffaa00; animation: pulseVip 1.5s infinite; }

        @keyframes pulseOwner { 0% { box-shadow: 0 0 10px #ff4500; } 50% { box-shadow: 0 0 25px #ff4500; } 100% { box-shadow: 0 0 10px #ff4500; } }
        @keyframes pulseAdmin { 0% { box-shadow: 0 0 10px #ff0000; } 50% { box-shadow: 0 0 25px #ff0000; } }
        @keyframes pulseMod { 0% { box-shadow: 0 0 10px #00ff00; } 50% { box-shadow: 0 0 25px #00ff00; } }
        @keyframes pulseVip { 0% { box-shadow: 0 0 15px #ffaa00; } 50% { box-shadow: 0 0 30px #ffaa00; } }

        .message-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-bottom: 0.3rem;
            color: #a0ffc0;
            align-items: center;
            cursor: pointer;
        }
        .message-time { opacity: 0.7; }
        .modified-tag { font-size: 0.6rem; font-style: italic; color: #88ff88; margin-left: 0.3rem; }

        .input-area {
            padding: 1rem 2rem;
            border-top: 2px solid #00ff80;
            display: flex;
            gap: 0.5rem;
            background: rgba(0,0,0,0.3);
        }
        #messageInput {
            flex: 1;
            background: #1a2a1a;
            border: 1px solid #00ff80;
            border-radius: 2rem;
            padding: 0.9rem 1.5rem;
            color: #00ff80;
            outline: none;
        }
        #sendBtn {
            background: #003d1a;
            border: 1px solid #00ff80;
            border-radius: 2rem;
            width: 3.2rem;
            color: #00ff80;
            cursor: pointer;
            font-size: 1.3rem;
        }
        #sendBtn:hover { background: #006633; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #0f1a0f;
            border: 2px solid #00ff80;
            border-radius: 2rem;
            padding: 2rem;
            max-width: 450px;
            width: 90%;
            color: #00ff80;
        }
        .modal-content h2 { margin-bottom: 1rem; text-align: center; }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            background: #1a2a1a;
            border: 1px solid #00ff80;
            border-radius: 2rem;
            color: #00ff80;
        }
        .modal-content button {
            background: #003d1a;
            border: 1px solid #00ff80;
            border-radius: 2rem;
            padding: 0.8rem;
            color: #00ff80;
            cursor: pointer;
            width: 100%;
            margin-bottom: 0.5rem;
        }
        .modal-content button.cancel { background: #4d1a1a; }

        .status-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            justify-content: center;
        }
        .status-option {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .status-option.green { background: #00ff00; }
        .status-option.gray { background: #888; }
        .status-option.red { background: #ff0000; }
        .status-option.dnd { background: #ff0000; position: relative; }
        .status-option.dnd::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 2px;
            background: black;
            top: 17px;
            left: 7px;
            transform: rotate(45deg);
        }
        .status-option:hover { border-color: white; }

        .footer {
            position: fixed;
            bottom: 5px;
            right: 10px;
            color: #a0ffc0;
            font-size: 0.8rem;
            opacity: 0.6;
            z-index: 3000;
        }
        .license {
            position: fixed;
            bottom: 5px;
            left: 10px;
            color: #a0ffc0;
            font-size: 0.7rem;
            opacity: 0.5;
        }
    </style>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <div class="footer">created by supramk4_arab_[SV]</div>
    <div class="license">© 2026 voxchat</div>

    <!-- Auth Card -->
    <div id="authContainer" class="auth-card">

    <!-- Email Verification Card (styled like auth) -->
    <div id="verificationContainer" class="auth-card hidden">
        <h2>VERIFY EMAIL</h2>
        <p>Link sent to <span id="verificationEmail"></span>.</p>
        <button id="resendVerificationBtn"><span>🔄</span> RESEND</button>
        <button id="checkVerificationBtn"><span>✅</span> I VERIFIED</button>
        <button id="logoutFromVerification" class="cancel">🚪 LOGOUT</button>
        <div id="verificationError" class="error-message"></div>
        <p class="spam-note">📧 Check your spam folder.</p>
    </div>

    <!-- Chat Card -->
    <div id="chatContainer" class="chat-card hidden">
        <div class="chat-header">
            <h2>#GENERAL</h2>
            <div class="header-actions">
                <button id="profileBtn"><span>✎</span> PROFILE</button>
                <button id="logoutBtn"><span>🚪</span> LOGOUT</button>
            </div>
        </div>
        <div id="messagesContainer" class="messages-area"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="TYPE MESSAGE...">
            <button id="sendBtn">➤</button>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <h2>EDIT PROFILE</h2>
            <input type="text" id="editDisplayName" placeholder="DISPLAY NAME">
            <div class="status-selector">
                <div class="status-option green" data-status="online"></div>
                <div class="status-option gray" data-status="offline"></div>
                <div class="status-option red" data-status="invisible"></div>
                <div class="status-option dnd" data-status="dnd"></div>
            </div>
            <label>Voxiom Detection (simulated)</label>
            <input type="checkbox" id="voxiomDetectCheckbox">
            <label>Voxiom Gems (manual)</label>
            <input type="number" id="voxiomGemsInput" value="0" min="0">
            <label>Voxiom Tab URL (optional)</label>
            <input type="url" id="voxiomUrlInput" placeholder="https://voxiom.io">
            <button id="saveProfileBtn">SAVE</button>
            <button id="closeProfileModal" class="cancel">CANCEL</button>
        </div>
    </div>

    <script>
        (function() {
            // Protocol warning
            if (window.location.protocol !== 'http:' && window.location.protocol !== 'https:') {
                alert('Please run this app through a local web server (e.g., "python -m http.server 8000")');
            }

            const firebaseConfig = {
                apiKey: "AIzaSyBcl3PMyIWLOzTAlr-CjySjax2XO8yZk1E",
                authDomain: "chat-2fcf1.firebaseapp.com",
                databaseURL: "https://chat-2fcf1-default-rtdb.firebaseio.com",
                projectId: "chat-2fcf1",
                storageBucket: "chat-2fcf1.firebasestorage.app",
                messagingSenderId: "116223270896",
                appId: "1:116223270896:web:a11fc355e8fdb7fd890735"
            };

            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.database();

            const usersRef = db.ref('users');
            const messagesRef = db.ref('general/messages');

            let currentUser = null;
            let unsubscribeMessages = null;
            let isLoginMode = true;
            let lastMessageDate = null;

            const ADMIN_EMAIL = 'hellcaten027@gmail.com';

            // DOM
            const authContainer = document.getElementById('authContainer');
            const verificationContainer = document.getElementById('verificationContainer');
            const verificationEmail = document.getElementById('verificationEmail');
            const chatContainer = document.getElementById('chatContainer');
            const formTitle = document.getElementById('formTitle');
            const loginInput = document.getElementById('loginInput');
            const passwordInput = document.getElementById('passwordInput');
            const nameInput = document.getElementById('nameInput');
            const authActionBtn = document.getElementById('authActionBtn');
            const toggleSpan = document.getElementById('toggleAuthMode');
            const authError = document.getElementById('authError');
            const logoutBtn = document.getElementById('logoutBtn');
            const logoutFromVerification = document.getElementById('logoutFromVerification');
            const resendVerificationBtn = document.getElementById('resendVerificationBtn');
            const checkVerificationBtn = document.getElementById('checkVerificationBtn');
            const verificationError = document.getElementById('verificationError');
            const messagesContainer = document.getElementById('messagesContainer');
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const googleSignInBtn = document.getElementById('googleSignInBtn');
            const anonymousSignInBtn = document.getElementById('anonymousSignInBtn');
            const rememberMe = document.getElementById('rememberMe');
            const profileBtn = document.getElementById('profileBtn');
            const profileModal = document.getElementById('profileModal');
            const editDisplayName = document.getElementById('editDisplayName');
            const saveProfileBtn = document.getElementById('saveProfileBtn');
            const closeProfileModal = document.getElementById('closeProfileModal');
            const statusOptions = document.querySelectorAll('.status-option');
            const voxiomDetectCheckbox = document.getElementById('voxiomDetectCheckbox');
            const voxiomGemsInput = document.getElementById('voxiomGemsInput');
            const voxiomUrlInput = document.getElementById('voxiomUrlInput');

            function showError(msg) { authError.innerText = msg; }

            // Persistence
            function setPersistence() {
                return auth.setPersistence(rememberMe.checked ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION);
            }

            // Toggle auth mode
            toggleSpan.addEventListener('click', () => {
                isLoginMode = !isLoginMode;
                if (isLoginMode) {
                    formTitle.innerText = 'SIGN IN';
                    authActionBtn.innerHTML = '<span>🔑</span> SIGN IN';
                    nameInput.classList.add('hidden');
                    toggleSpan.innerText = 'NEED AN ACCOUNT? SIGN UP';
                } else {
                    formTitle.innerText = 'SIGN UP';
                    authActionBtn.innerHTML = '<span>📝</span> SIGN UP';
                    nameInput.classList.remove('hidden');
                    toggleSpan.innerText = 'ALREADY HAVE AN ACCOUNT? SIGN IN';
                }
                authError.innerText = '';
            });

            // Email login
            async function handleEmailPasswordLogin() {
                const email = loginInput.value.trim();
                const pwd = passwordInput.value.trim();
                if (!email || !pwd) { showError('EMAIL AND PASSWORD REQUIRED'); return; }
                try {
                    await setPersistence();
                    await auth.signInWithEmailAndPassword(email, pwd);
                } catch (e) {
                    showError('INVALID EMAIL OR PASSWORD');
                }
            }

            // Email signup
            async function handleEmailPasswordSignUp() {
                const email = loginInput.value.trim();
                const pwd = passwordInput.value.trim();
                const displayName = nameInput.value.trim();
                if (!email || !pwd || !displayName) { showError('ALL FIELDS REQUIRED'); return; }
                try {
                    await setPersistence();
                    const cred = await auth.createUserWithEmailAndPassword(email, pwd);
                    await cred.user.updateProfile({ displayName });
                    let role = 'member';
                    if (email === ADMIN_EMAIL) role = 'owner';
                    await usersRef.child(cred.user.uid).set({
                        email,
                        displayName,
                        role,
                        status: 'online',
                        voxiomDetect: false,
                        voxiomGems: 0,
                        voxiomUrl: '',
                        createdAt: Date.now()
                    });
                    await cred.user.sendEmailVerification();
                } catch (e) {
                    showError(e.message);
                }
            }

            authActionBtn.addEventListener('click', (e) => {
                e.preventDefault();
                if (isLoginMode) handleEmailPasswordLogin();
                else handleEmailPasswordSignUp();
            });

            googleSignInBtn.addEventListener('click', async () => {
                try {
                    await setPersistence();
                    await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
                } catch (e) {
                    showError(e.message);
                }
            });

            anonymousSignInBtn.addEventListener('click', async () => {
                try {
                    await setPersistence();
                    await auth.signInAnonymously();
                } catch (e) {
                    showError(e.message);
                }
            });

            // Attach messages
            function attachMessageListeners(user) {
                if (unsubscribeMessages) unsubscribeMessages();
                messagesContainer.innerHTML = '<div class="status-badge">✨ LOADING...</div>';
                unsubscribeMessages = messagesRef.orderByChild('timestamp').limitToLast(50).on('child_added', (snapshot) => {
                    const msg = snapshot.val();
                    if (!msg) return;
                    if (messagesContainer.children.length === 1 && messagesContainer.children[0].classList.contains('status-badge')) {
                        messagesContainer.innerHTML = '';
                    }
                    const msgDate = new Date(msg.timestamp).toLocaleDateString();
                    if (msgDate !== lastMessageDate) {
                        const divider = document.createElement('div');
                        divider.className = 'date-divider';
                        divider.innerText = `⚡ ${msgDate} ⚡`;
                        messagesContainer.appendChild(divider);
                        lastMessageDate = msgDate;
                    }
                    const msgDiv = document.createElement('div');
                    msgDiv.classList.add('message-bubble');
                    const isOwn = msg.uid === user.uid;
                    if (isOwn) msgDiv.classList.add('own');
                    msgDiv.dataset.id = snapshot.key;

                    // Add role class for styling (if stored)
                    if (msg.roleClass) msgDiv.classList.add(msg.roleClass);

                    const timeStr = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString() : '';
                    const modifiedHtml = msg.edited ? '<span class="modified-tag">(edited)</span>' : '';

                    msgDiv.innerHTML = `
                        <div class="message-header">
                            <span class="clickable-name">${escapeHtml(msg.name)}</span>
                            <span class="message-time">${timeStr}${modifiedHtml}</span>
                        </div>
                        <div>${escapeHtml(msg.text)}</div>
                    `;
                    messagesContainer.appendChild(msgDiv);
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                });
            }

            // Auth state
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    currentUser = user;
                    const snap = await usersRef.child(user.uid).once('value');
                    let profile = snap.val();
                    if (!profile && !user.isAnonymous) {
                        let role = 'member';
                        if (user.email === ADMIN_EMAIL) role = 'owner';
                        profile = {
                            email: user.email,
                            displayName: user.displayName || user.email,
                            role,
                            status: 'online',
                            voxiomDetect: false,
                            voxiomGems: 0,
                            voxiomUrl: '',
                            createdAt: Date.now()
                        };
                        await usersRef.child(user.uid).set(profile);
                    } else if (user.isAnonymous) {
                        if (!profile) {
                            profile = {
                                displayName: 'guest#' + Math.random().toString(36).substring(2,7),
                                role: 'guest',
                                status: 'online',
                                voxiomDetect: false,
                                voxiomGems: 0,
                                voxiomUrl: '',
                                createdAt: Date.now()
                            };
                            await usersRef.child(user.uid).set(profile);
                        }
                    }

                    // Email verification
                    if (!user.isAnonymous && !user.emailVerified) {
                        authContainer.classList.add('hidden');
                        verificationContainer.classList.remove('hidden');
                        verificationEmail.innerText = user.email;
                        const interval = setInterval(async () => {
                            await user.reload();
                            if (user.emailVerified) {
                                clearInterval(interval);
                                verificationContainer.classList.add('hidden');
                                authContainer.classList.add('hidden');
                                chatContainer.classList.remove('hidden');
                                attachMessageListeners(user);
                            }
                        }, 3000);
                        logoutFromVerification.onclick = () => auth.signOut();
                        resendVerificationBtn.onclick = async () => {
                            try {
                                await user.sendEmailVerification();
                                verificationError.innerText = 'EMAIL SENT!';
                            } catch (e) {
                                verificationError.innerText = e.message;
                            }
                        };
                        checkVerificationBtn.onclick = async () => {
                            await user.reload();
                            if (user.emailVerified) {
                                clearInterval(interval);
                                verificationContainer.classList.add('hidden');
                                authContainer.classList.add('hidden');
                                chatContainer.classList.remove('hidden');
                                attachMessageListeners(user);
                            } else {
                                verificationError.innerText = 'NOT VERIFIED YET.';
                            }
                        };
                        return;
                    }

                    authContainer.classList.add('hidden');
                    verificationContainer.classList.add('hidden');
                    chatContainer.classList.remove('hidden');
                    attachMessageListeners(user);
                } else {
                    currentUser = null;
                    if (unsubscribeMessages) unsubscribeMessages();
                    authContainer.classList.remove('hidden');
                    verificationContainer.classList.add('hidden');
                    chatContainer.classList.add('hidden');
                    profileModal.classList.remove('active');
                }
            });

            // Send message
            async function sendMessage() {
                if (!currentUser) return;
                let text = messageInput.value.trim();
                if (!text) return;
                // Simple profanity filter
                const badWords = ['fuck','shit','damn','ass','bitch','cunt','dick','pussy','nigger','faggot','kys','nazi','aimbot','hack','cheat','retard'];
                badWords.forEach(word => {
                    const regex = new RegExp('\\b' + word + '\\b', 'gi');
                    text = text.replace(regex, '****');
                });
                const profile = (await usersRef.child(currentUser.uid).once('value')).val() || {};
                await messagesRef.push({
                    uid: currentUser.uid,
                    name: profile.displayName || currentUser.displayName || 'User',
                    text,
                    timestamp: Date.now(),
                    roleClass: profile.role ? (profile.role === 'owner' ? 'role-owner' : profile.role === 'admin' ? 'role-admin' : profile.role === 'mod' ? 'role-mod' : '') : ''
                });
                messageInput.value = '';
            }
            sendBtn.addEventListener('click', sendMessage);
            messageInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

            // Logout
            logoutBtn.addEventListener('click', () => auth.signOut());
            logoutFromVerification.addEventListener('click', () => auth.signOut());

            // Profile
            profileBtn.addEventListener('click', async () => {
                if (!currentUser) return;
                const profile = (await usersRef.child(currentUser.uid).once('value')).val() || {};
                editDisplayName.value = profile.displayName || '';
                voxiomDetectCheckbox.checked = profile.voxiomDetect || false;
                voxiomGemsInput.value = profile.voxiomGems || 0;
                voxiomUrlInput.value = profile.voxiomUrl || '';
                profileModal.classList.add('active');
            });
            closeProfileModal.addEventListener('click', () => profileModal.classList.remove('active'));

            // Status options
            statusOptions.forEach(opt => {
                opt.addEventListener('click', async () => {
                    const status = opt.dataset.status;
                    await usersRef.child(currentUser.uid).update({ status });
                });
            });

            // Save profile
            saveProfileBtn.addEventListener('click', async () => {
                const newDisplayName = editDisplayName.value.trim();
                const updates = {};
                if (newDisplayName && newDisplayName !== currentUser.displayName) {
                    updates.displayName = newDisplayName;
                    await currentUser.updateProfile({ displayName: newDisplayName });
                }
                updates.voxiomDetect = voxiomDetectCheckbox.checked;
                updates.voxiomGems = parseInt(voxiomGemsInput.value) || 0;
                updates.voxiomUrl = voxiomUrlInput.value.trim() || '';
                await usersRef.child(currentUser.uid).update(updates);
                profileModal.classList.remove('active');
            });

            function escapeHtml(unsafe) {
                return unsafe.replace(/[&<>"]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[m]));
            }
        })();
    </script>
</body>
</html>
