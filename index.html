<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Chat · Typing Indicator · Profile Colors · Fixed Clear</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at 20% 30%, #1a2639, #0b0f17);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            padding: 1rem;
        }

        .auth-card {
            max-width: 420px;
            width: 100%;
            border-radius: 2.5rem;
            padding: 2.5rem;
            color: white;
            background: rgba(10, 15, 25, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(114, 137, 218, 0.3);
            box-shadow: 0 0 40px rgba(114, 137, 218, 0.2);
            animation: glow 4s infinite alternate;
        }

        @keyframes glow {
            0% { box-shadow: 0 0 20px #5865f2; }
            100% { box-shadow: 0 0 40px #eb459e; }
        }

        .auth-form { display: flex; flex-direction: column; gap: 1.2rem; }
        .auth-form h2 { text-align: center; font-weight: 600; font-size: 2rem; background: linear-gradient(135deg, #7289da, #eb459e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .auth-form input { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 3rem; padding: 1rem 1.5rem; font-size: 1rem; color: white; outline: none; transition: 0.2s; }
        .auth-form input:focus { border-color: #7289da; box-shadow: 0 0 15px #7289da; }
        .auth-form button { background: linear-gradient(145deg, #5865f2, #404eed); border: none; border-radius: 3rem; padding: 1rem; font-weight: 600; font-size: 1.1rem; color: white; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .auth-form button:hover { transform: scale(1.02); box-shadow: 0 0 20px #5865f2; }
        .auth-form button:disabled { opacity: 0.5; cursor: not-allowed; }
        .auth-toggle { text-align: center; color: #a0b3d9; }
        .auth-toggle span { color: #7289da; cursor: pointer; font-weight: 600; text-decoration: underline; }
        .error-message { color: #ff7b7b; text-align: center; font-size: 0.9rem; }
        .divider { display: flex; align-items: center; color: #7d96b0; margin: 0.5rem 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .social-buttons { display: flex; gap: 0.8rem; flex-wrap: wrap; }
        .social-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 3rem; padding: 0.9rem; color: white; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .social-btn:hover { background: rgba(255,255,255,0.1); border-color: #7289da; }
        .hidden { display: none !important; }

        .verification-card {
            max-width: 500px;
            width: 100%;
            border-radius: 2.5rem;
            padding: 2.5rem;
            color: white;
            background: rgba(10, 15, 25, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(114, 137, 218, 0.3);
            text-align: center;
        }
        .verification-card h2 { margin-bottom: 1rem; }
        .verification-card p { margin-bottom: 2rem; color: #b9c8ff; }
        .verification-card button { background: linear-gradient(145deg, #5865f2, #404eed); border: none; border-radius: 3rem; padding: 1rem 2rem; color: white; font-weight: 600; cursor: pointer; margin: 0.5rem; }

        .chat-card {
            max-width: 800px;
            width: 100%;
            height: 90vh;
            border-radius: 2rem;
            overflow: hidden;
            background: rgba(10,15,25,0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 1rem 2rem;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
        }
        .room-info { display: flex; align-items: center; gap: 15px; }
        .room-name { font-size: 1.4rem; font-weight: 600; cursor: pointer; }
        .header-actions { display: flex; gap: 10px; }
        .header-actions button { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 0.5rem 1.2rem; border-radius: 2rem; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .header-actions button:hover { background: #5865f2; border-color: #5865f2; }
        .header-actions .danger-btn:hover { background: #ed4245; }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message-bubble {
            max-width: 70%;
            padding: 1rem 1.5rem;
            border-radius: 1.8rem 1.8rem 1.8rem 0.3rem;
            align-self: flex-start;
            background: rgba(30,35,50,0.8);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.05);
            color: #e0e7ff;
            position: relative;
        }
        .message-bubble.own {
            align-self: flex-end;
            background: linear-gradient(145deg, #5865f2, #404eed);
            border-radius: 1.8rem 1.8rem 0.3rem 1.8rem;
            color: white;
        }
        .message-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .message-sender { font-weight: 700; font-size: 0.9rem; }
        .message-time { font-size: 0.7rem; opacity: 0.6; margin-left: auto; }
        .delete-message {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ed4245;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 14px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .message-bubble.own:hover .delete-message {
            display: flex;
        }

        .typing-indicator {
            font-size: 0.8rem;
            color: #a0b3d9;
            padding: 0.5rem 2rem;
            font-style: italic;
            min-height: 2rem;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .input-area {
            padding: 1.5rem 2rem;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        #messageInput {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 3rem;
            padding: 1rem 1.5rem;
            color: white;
            outline: none;
        }
        #messageInput:focus { border-color: #5865f2; box-shadow: 0 0 15px #5865f2; }
        .action-btn {
            background: rgba(88,101,242,0.3);
            border: 1px solid #5865f2;
            border-radius: 3rem;
            width: 3.2rem;
            height: 3.2rem;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .action-btn:hover { background: #5865f2; }

        .status-badge { color: #9bb5db; text-align: center; padding: 1rem; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: rgba(20,25,40,0.95);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(114,137,218,0.5);
            color: white;
        }
        .modal-content h2 { margin-bottom: 1.5rem; }
        .modal-content input, .modal-content input[type="color"] {
            width: 100%;
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2rem;
            color: white;
            outline: none;
        }
        .modal-content button {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(145deg, #5865f2, #404eed);
            border: none;
            border-radius: 2rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 0.5rem;
        }
        .modal-content .error-message { margin-bottom: 1rem; }
        .last-login { font-size: 0.8rem; color: #b9c8ff; margin-top: 0.5rem; }
    </style>
    <!-- Firebase SDK (compat version) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <!-- Emoji Picker Web Component -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js"></script>
</head>
<body>
    <!-- Auth Card -->
    <div id="authContainer" class="auth-card">
        <div class="auth-form">
            <h2 id="formTitle">✦ SIGN IN ✦</h2>
            <input type="email" id="loginInput" placeholder="Email">
            <input type="password" id="passwordInput" placeholder="Password">
            <input type="text" id="nameInput" placeholder="Display Name" class="hidden">
            <button id="authActionBtn">Sign In</button>
            <div class="divider">or</div>
            <div class="social-buttons">
                <button id="googleSignInBtn" class="social-btn">🌐 Google</button>
                <button id="anonymousSignInBtn" class="social-btn">👤 Guest</button>
            </div>
            <div class="auth-toggle">
                <span id="toggleAuthMode">Need an account? Sign up</span>
            </div>
            <div id="authError" class="error-message"></div>
        </div>
    </div>

    <!-- Email Verification Card -->
    <div id="verificationContainer" class="verification-card hidden">
        <h2>Verify Your Email</h2>
        <p>We've sent a verification link to <span id="verificationEmail"></span>. Please check your inbox and click the link to activate your account.</p>
        <button id="resendVerificationBtn">Resend Verification Email</button>
        <button id="checkVerificationBtn">I've Verified, Continue</button>
        <button id="logoutFromVerification">Logout</button>
        <div id="verificationError" class="error-message"></div>
    </div>

    <!-- Chat Card -->
    <div id="chatContainer" class="chat-card hidden">
        <div class="chat-header" id="chatHeader">
            <div class="room-info">
                <span id="roomName" class="room-name" onclick="openProfileModal()">#general</span>
            </div>
            <div class="header-actions">
                <button id="clearChatBtn" class="danger-btn">🧹 Clear Chat</button>
                <button id="logoutBtn">🚪 Logout</button>
            </div>
        </div>
        <div id="messagesContainer" class="messages-area"></div>
        <div id="typingIndicator" class="typing-indicator"></div>
        <div class="input-area">
            <button id="emojiBtn" class="action-btn">😊</button>
            <input type="text" id="messageInput" placeholder="Type a message...">
            <button id="sendBtn" class="action-btn">➤</button>
        </div>
    </div>

    <!-- Emoji Modal -->
    <div id="emojiModal" class="modal">
        <div class="modal-content">
            <h3>Pick Emoji</h3>
            <emoji-picker id="emojiPicker"></emoji-picker>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <h2>Edit Profile</h2>
            <input type="text" id="editDisplayName" placeholder="Display Name">
            <label>Name Color</label>
            <input type="color" id="profileColor" value="#b9c8ff">
            <label>Banner Color</label>
            <input type="color" id="bannerColor" value="#2c2f33">
            <input type="email" id="editEmail" placeholder="New Email (leave blank to keep current)">
            <button id="saveProfileBtn">Save Changes</button>
            <button id="closeProfileModal">Close</button>
            <div id="profileError" class="error-message"></div>
            <div id="lastLoginDisplay" class="last-login"></div>
        </div>
    </div>

    <!-- Email Re-verification Modal -->
    <div id="reverifyModal" class="modal">
        <div class="modal-content">
            <h2>Verify New Email</h2>
            <p>We've sent a verification link to <span id="newEmailSpan"></span>. Please verify it to complete the change.</p>
            <button id="closeReverifyModal">OK</button>
        </div>
    </div>

    <script>
        /*
        ================================================
        SECURITY RULES FOR REALTIME DATABASE
        Copy and paste into Firebase Console -> Realtime Database -> Rules
        ================================================
        {
          "rules": {
            "users": {
              ".read": "auth != null",
              ".write": "auth != null && (auth.uid === $uid || auth.token.email === 'hellcaten027@gmail.com')"
            },
            "general": {
              "messages": {
                ".indexOn": "timestamp",
                ".read": "auth != null",
                ".write": "auth != null",
                "$message": {
                  ".write": "auth != null && (auth.uid === data.child('uid').val() || auth.token.email === 'hellcaten027@gmail.com')"
                }
              },
              "typing": {
                ".read": "auth != null",
                ".write": "auth != null"
              }
            }
          }
        }
        ================================================
        */

        (function() {
            // 🔥 YOUR FIREBASE CONFIGURATION
            const firebaseConfig = {
                apiKey: "AIzaSyBcl3PMyIWLOzTAlr-CjySjax2XO8yZk1E",
                authDomain: "chat-2fcf1.firebaseapp.com",
                databaseURL: "https://chat-2fcf1-default-rtdb.firebaseio.com",
                projectId: "chat-2fcf1",
                storageBucket: "chat-2fcf1.firebasestorage.app",
                messagingSenderId: "116223270896",
                appId: "1:116223270896:web:a11fc355e8fdb7fd890735",
                measurementId: "G-12X88C4L8X"
            };

            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.database();

            // References
            const usersRef = db.ref('users');
            const messagesRef = db.ref('general/messages');
            const typingRef = db.ref('general/typing'); // store typing status per user

            // State
            let currentUser = null;
            let unsubscribeMessages = null;
            let unsubscribeTyping = null;
            let isLoginMode = true;
            let typingTimeout = null;

            // DOM elements
            const authContainer = document.getElementById('authContainer');
            const verificationContainer = document.getElementById('verificationContainer');
            const verificationEmail = document.getElementById('verificationEmail');
            const chatContainer = document.getElementById('chatContainer');
            const chatHeader = document.getElementById('chatHeader');
            const formTitle = document.getElementById('formTitle');
            const loginInput = document.getElementById('loginInput');
            const passwordInput = document.getElementById('passwordInput');
            const nameInput = document.getElementById('nameInput');
            const authActionBtn = document.getElementById('authActionBtn');
            const toggleSpan = document.getElementById('toggleAuthMode');
            const authError = document.getElementById('authError');
            const logoutBtn = document.getElementById('logoutBtn');
            const logoutFromVerification = document.getElementById('logoutFromVerification');
            const resendVerificationBtn = document.getElementById('resendVerificationBtn');
            const checkVerificationBtn = document.getElementById('checkVerificationBtn');
            const verificationError = document.getElementById('verificationError');
            const clearChatBtn = document.getElementById('clearChatBtn');
            const messagesContainer = document.getElementById('messagesContainer');
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const googleSignInBtn = document.getElementById('googleSignInBtn');
            const anonymousSignInBtn = document.getElementById('anonymousSignInBtn');
            const emojiBtn = document.getElementById('emojiBtn');
            const emojiModal = document.getElementById('emojiModal');
            const emojiPicker = document.getElementById('emojiPicker');
            const profileModal = document.getElementById('profileModal');
            const editDisplayName = document.getElementById('editDisplayName');
            const profileColor = document.getElementById('profileColor');
            const bannerColor = document.getElementById('bannerColor');
            const editEmail = document.getElementById('editEmail');
            const saveProfileBtn = document.getElementById('saveProfileBtn');
            const closeProfileModal = document.getElementById('closeProfileModal');
            const profileError = document.getElementById('profileError');
            const lastLoginDisplay = document.getElementById('lastLoginDisplay');
            const reverifyModal = document.getElementById('reverifyModal');
            const newEmailSpan = document.getElementById('newEmailSpan');
            const closeReverifyModal = document.getElementById('closeReverifyModal');
            const typingIndicator = document.getElementById('typingIndicator');

            // Profanity filter
            const badWords = ['fuck','shit','damn','hell','ass','bitch','cunt','dick','pussy','nigger','faggot','kys','retard'];
            function filterProfanity(text) {
                let filtered = text;
                badWords.forEach(word => {
                    const regex = new RegExp('\\b' + word + '\\b', 'gi');
                    filtered = filtered.replace(regex, '****');
                });
                return filtered;
            }

            function showError(msg) { authError.innerText = msg; }

            // Toggle sign in / sign up
            toggleSpan.addEventListener('click', () => {
                isLoginMode = !isLoginMode;
                if (isLoginMode) {
                    formTitle.innerText = '✦ SIGN IN ✦';
                    authActionBtn.innerText = 'Sign In';
                    nameInput.classList.add('hidden');
                    toggleSpan.innerText = 'Need an account? Sign up';
                } else {
                    formTitle.innerText = '✦ SIGN UP ✦';
                    authActionBtn.innerText = 'Sign Up';
                    nameInput.classList.remove('hidden');
                    toggleSpan.innerText = 'Already have an account? Sign in';
                }
                authError.innerText = '';
            });

            // Email login
            async function handleEmailPasswordLogin() {
                const email = loginInput.value.trim();
                const pwd = passwordInput.value.trim();
                if (!email || !pwd) { showError('Email and password required'); return; }
                try {
                    await auth.signInWithEmailAndPassword(email, pwd);
                } catch (e) {
                    if (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') {
                        showError('Invalid email or password');
                    } else {
                        showError(e.message);
                    }
                }
            }

            // Email signup
            async function handleEmailPasswordSignUp() {
                const email = loginInput.value.trim();
                const pwd = passwordInput.value.trim();
                const displayName = nameInput.value.trim();
                if (!email || !pwd || !displayName) { showError('All fields required'); return; }
                if (!email.includes('@')) { showError('Invalid email'); return; }

                try {
                    const cred = await auth.createUserWithEmailAndPassword(email, pwd);
                    await cred.user.updateProfile({ displayName });
                    await usersRef.child(cred.user.uid).set({
                        email, displayName,
                        profileColor: '#b9c8ff',
                        bannerColor: '#2c2f33',
                        createdAt: Date.now(),
                        lastLogin: Date.now(),
                        bannedUntil: null, disabled: false
                    });
                    await cred.user.sendEmailVerification();
                } catch (e) {
                    if (e.code === 'auth/email-already-in-use') {
                        showError('Email already in use');
                    } else {
                        showError(e.message);
                    }
                }
            }

            authActionBtn.addEventListener('click', (e) => {
                e.preventDefault();
                if (isLoginMode) handleEmailPasswordLogin();
                else handleEmailPasswordSignUp();
            });

            googleSignInBtn.addEventListener('click', () => {
                auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e => showError(e.message));
            });

            anonymousSignInBtn.addEventListener('click', () => {
                auth.signInAnonymously().catch(e => showError(e.message));
            });

            // Check global bans
            async function checkUserStatus(user) {
                const snap = await usersRef.child(user.uid).once('value');
                const profile = snap.val();
                if (!profile) return true; // no profile = not banned
                if (profile.disabled) { await auth.signOut(); alert('Account disabled'); return false; }
                if (profile.bannedUntil && profile.bannedUntil > Date.now()) { await auth.signOut(); alert('You are banned'); return false; }
                return true;
            }

            // Update last login
            async function updateLastLogin(uid) {
                await usersRef.child(uid).update({ lastLogin: Date.now() });
            }

            // Typing indicator handlers
            function setupTypingListener() {
                if (unsubscribeTyping) unsubscribeTyping();
                unsubscribeTyping = typingRef.on('value', (snapshot) => {
                    const typingData = snapshot.val() || {};
                    const typingUsers = [];
                    for (let uid in typingData) {
                        if (uid !== currentUser?.uid && typingData[uid] === true) {
                            // fetch user's display name
                            usersRef.child(uid).child('displayName').once('value').then(nameSnap => {
                                const name = nameSnap.val() || 'Someone';
                                typingUsers.push(name);
                                updateTypingIndicator(typingUsers);
                            });
                        }
                    }
                    if (typingUsers.length === 0) {
                        typingIndicator.innerText = '';
                    }
                });
            }

            function updateTypingIndicator(users) {
                if (users.length === 0) {
                    typingIndicator.innerText = '';
                } else if (users.length === 1) {
                    typingIndicator.innerText = `${users[0]} is typing...`;
                } else if (users.length === 2) {
                    typingIndicator.innerText = `${users[0]} and ${users[1]} are typing...`;
                } else {
                    typingIndicator.innerText = 'Several people are typing...';
                }
            }

            function handleTyping() {
                if (!currentUser) return;
                typingRef.child(currentUser.uid).set(true);
                if (typingTimeout) clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    typingRef.child(currentUser.uid).remove();
                    typingTimeout = null;
                }, 2000);
            }

            // Auth state
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    // Email verification check (skip anonymous)
                    if (!user.isAnonymous && !user.emailVerified) {
                        authContainer.classList.add('hidden');
                        verificationContainer.classList.remove('hidden');
                        verificationEmail.innerText = user.email;
                        const interval = setInterval(async () => {
                            await user.reload();
                            if (user.emailVerified) {
                                clearInterval(interval);
                                verificationContainer.classList.add('hidden');
                                await loadChat(user);
                            }
                        }, 3000);
                        logoutFromVerification.onclick = () => auth.signOut();
                        resendVerificationBtn.onclick = async () => {
                            try {
                                await user.sendEmailVerification();
                                verificationError.innerText = 'Verification email sent!';
                            } catch (e) {
                                verificationError.innerText = e.message;
                            }
                        };
                        checkVerificationBtn.onclick = async () => {
                            await user.reload();
                            if (user.emailVerified) {
                                clearInterval(interval);
                                verificationContainer.classList.add('hidden');
                                await loadChat(user);
                            } else {
                                verificationError.innerText = 'Email not verified yet.';
                            }
                        };
                        return;
                    }

                    await loadChat(user);
                    await updateLastLogin(user.uid);
                    setupTypingListener();

                    // Clear chat button is visible to all
                } else {
                    // Signed out: clean up
                    if (unsubscribeMessages) {
                        unsubscribeMessages();
                        unsubscribeMessages = null;
                    }
                    if (unsubscribeTyping) {
                        unsubscribeTyping();
                        unsubscribeTyping = null;
                    }
                    if (typingTimeout) clearTimeout(typingTimeout);
                    authContainer.classList.remove('hidden');
                    verificationContainer.classList.add('hidden');
                    chatContainer.classList.add('hidden');
                    profileModal.classList.remove('active');
                    reverifyModal.classList.remove('active');
                    emojiModal.classList.remove('active');
                }
            });

            async function loadChat(user) {
                if (!(await checkUserStatus(user))) return;
                currentUser = user;
                authContainer.classList.add('hidden');
                verificationContainer.classList.add('hidden');
                chatContainer.classList.remove('hidden');

                // Ensure user profile exists
                let profile = (await usersRef.child(user.uid).once('value')).val();
                if (!profile && !user.isAnonymous) {
                    profile = {
                        email: user.email,
                        displayName: user.displayName || user.email,
                        profileColor: '#b9c8ff',
                        bannerColor: '#2c2f33',
                        createdAt: Date.now(),
                        lastLogin: Date.now(),
                        bannedUntil: null, disabled: false
                    };
                    await usersRef.child(user.uid).set(profile);
                } else if (user.isAnonymous) {
                    if (!profile) {
                        profile = {
                            displayName: 'guest#' + Math.random().toString(36).substring(2,7),
                            profileColor: '#b9c8ff',
                            bannerColor: '#2c2f33',
                            createdAt: Date.now(),
                            lastLogin: Date.now(),
                            isAnonymous: true
                        };
                        await usersRef.child(user.uid).set(profile);
                    } else {
                        await usersRef.child(user.uid).update({ lastLogin: Date.now() });
                    }
                }

                // Apply banner color
                if (profile?.bannerColor) {
                    chatHeader.style.background = `linear-gradient(145deg, ${profile.bannerColor}, ${adjustBrightness(profile.bannerColor, -20)})`;
                }

                // Load messages
                if (unsubscribeMessages) unsubscribeMessages();
                messagesContainer.innerHTML = '<div class="status-badge">✨ loading...</div>';
                unsubscribeMessages = messagesRef.orderByChild('timestamp').limitToLast(50).on('child_added', (snapshot) => {
                    const msg = snapshot.val();
                    if (!msg) return;
                    if (messagesContainer.children.length === 1 && messagesContainer.children[0].classList.contains('status-badge')) {
                        messagesContainer.innerHTML = '';
                    }
                    const msgDiv = document.createElement('div');
                    msgDiv.classList.add('message-bubble');
                    const isOwn = msg.uid === user.uid;
                    if (isOwn) msgDiv.classList.add('own');
                    else msgDiv.classList.add('other');
                    msgDiv.dataset.id = snapshot.key;

                    const timeStr = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString() : '';

                    // Get sender's color
                    let senderColor = '#b9c8ff';
                    if (msg.senderColor) senderColor = msg.senderColor;

                    msgDiv.innerHTML = `
                        <div class="message-header">
                            <span class="message-sender" style="color: ${senderColor}">${escapeHtml(msg.name)}</span>
                            <span class="message-time">${timeStr}</span>
                        </div>
                        <div>${escapeHtml(msg.text)}</div>
                        ${isOwn ? '<button class="delete-message" onclick="deleteMessage(\'' + snapshot.key + '\')">✕</button>' : ''}
                    `;
                    messagesContainer.appendChild(msgDiv);
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                });
            }

            function adjustBrightness(hex, percent) {
                let R = parseInt(hex.substring(1,3),16);
                let G = parseInt(hex.substring(3,5),16);
                let B = parseInt(hex.substring(5,7),16);
                R = Math.min(255, Math.max(0, R + percent));
                G = Math.min(255, Math.max(0, G + percent));
                B = Math.min(255, Math.max(0, B + percent));
                return `#${((1 << 24) + (R << 16) + (G << 8) + B).toString(16).slice(1)}`;
            }

            // Send message
            async function sendMessage() {
                if (!currentUser) return;
                let text = messageInput.value.trim();
                if (!text) return;
                text = filterProfanity(text);
                const profile = (await usersRef.child(currentUser.uid).once('value')).val() || {};
                await messagesRef.push({
                    uid: currentUser.uid,
                    name: profile.displayName || currentUser.displayName || 'User',
                    text,
                    timestamp: Date.now(),
                    senderColor: profile.profileColor
                });
                messageInput.value = '';
                // Remove typing indicator after sending
                typingRef.child(currentUser.uid).remove();
                if (typingTimeout) clearTimeout(typingTimeout);
            }
            sendBtn.addEventListener('click', sendMessage);
            messageInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
            messageInput.addEventListener('input', handleTyping);

            // Logout
            logoutBtn.addEventListener('click', () => auth.signOut());

            // Clear chat (all users)
            clearChatBtn.addEventListener('click', async () => {
                if (confirm('Delete all messages in general?')) {
                    await messagesRef.set(null);
                }
            });

            // Delete message
            window.deleteMessage = async (messageId) => {
                if (!currentUser) return;
                if (confirm('Delete this message?')) {
                    await messagesRef.child(messageId).remove();
                }
            };

            // Emoji picker
            emojiBtn.addEventListener('click', () => emojiModal.classList.add('active'));
            emojiPicker.addEventListener('emoji-click', e => {
                messageInput.value += e.detail.unicode;
                messageInput.focus();
                emojiModal.classList.remove('active');
                handleTyping(); // trigger typing indicator
            });

            // Close emoji modal on outside click
            emojiModal.addEventListener('click', e => {
                if (e.target === emojiModal) emojiModal.classList.remove('active');
            });

            // Profile modal
            window.openProfileModal = async () => {
                if (!currentUser) return;
                const profile = (await usersRef.child(currentUser.uid).once('value')).val() || {};
                editDisplayName.value = profile.displayName || '';
                profileColor.value = profile.profileColor || '#b9c8ff';
                bannerColor.value = profile.bannerColor || '#2c2f33';
                editEmail.value = ''; // leave blank
                if (profile.lastLogin) {
                    const date = new Date(profile.lastLogin);
                    lastLoginDisplay.innerText = `Last login: ${date.toLocaleString()}`;
                } else {
                    lastLoginDisplay.innerText = '';
                }
                profileModal.classList.add('active');
            };
            closeProfileModal.addEventListener('click', () => profileModal.classList.remove('active'));

            // Save profile changes
            saveProfileBtn.addEventListener('click', async () => {
                profileError.innerText = '';
                const newDisplayName = editDisplayName.value.trim();
                const newProfileColor = profileColor.value;
                const newBannerColor = bannerColor.value;
                const newEmail = editEmail.value.trim();

                const updates = {};

                // Update display name
                if (newDisplayName && newDisplayName !== currentUser.displayName) {
                    updates.displayName = newDisplayName;
                    await currentUser.updateProfile({ displayName: newDisplayName });
                }

                // Update colors
                if (newProfileColor) updates.profileColor = newProfileColor;
                if (newBannerColor) updates.bannerColor = newBannerColor;

                // Update email (if provided)
                if (newEmail && newEmail !== currentUser.email) {
                    try {
                        await currentUser.updateEmail(newEmail);
                        await currentUser.sendEmailVerification();
                        newEmailSpan.innerText = newEmail;
                        reverifyModal.classList.add('active');
                    } catch (e) {
                        profileError.innerText = e.message;
                        return;
                    }
                }

                // Save to database
                if (Object.keys(updates).length > 0) {
                    await usersRef.child(currentUser.uid).update(updates);
                }

                // Update banner immediately
                if (newBannerColor) {
                    chatHeader.style.background = `linear-gradient(145deg, ${newBannerColor}, ${adjustBrightness(newBannerColor, -20)})`;
                }

                profileModal.classList.remove('active');
            });

            closeReverifyModal.addEventListener('click', () => {
                reverifyModal.classList.remove('active');
            });

            function escapeHtml(unsafe) {
                return unsafe.replace(/[&<>"]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[m]));
            }
        })();
    </script>
</body>
</html>
